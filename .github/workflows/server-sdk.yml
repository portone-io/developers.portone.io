name: Server SDK

on:
  push:
    branches: [main]
    paths:
      - "src/schema/v2.openapi.json"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync OpenAPI to Server SDK
    environment: sdk-sync
    env:
      SDK_REPO: portone-io/server-sdk
      SYNC_BRANCH: chore/openapi
    permissions:
      # Required to checkout the repository
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.SDK_REPO }}
          path: sdk
          ref: main
          token: ${{ secrets.SDK_REPO_TOKEN }}
          persist-credentials: false

      - name: Create new branch
        run: git checkout -B "$SYNC_BRANCH"
        working-directory: sdk

      - name: Copy OpenAPI schema
        run: cp src/schema/v2.openapi.json sdk/codegen/openapi.json

      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Generate SDK code
        run: |
          deno fmt openapi.json && deno run -A main.ts js && deno run -A main.ts py && deno run -A main.ts jvm
        working-directory: sdk/codegen

      - name: Install Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: "3.9"

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev
        working-directory: sdk/python

      - name: Format Python code
        run: uv run ruff format
        working-directory: sdk/python

      - name: Add empty changeset for JavaScript changes
        run: |
          if git diff --quiet -- javascript; then
            exit 0
          fi

          cat <<'EOF' > javascript/.changeset/openapi-sync.md
          ---
          ---
          EOF
        working-directory: sdk

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        working-directory: sdk

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: update OpenAPI schema"
          git remote set-url origin "https://x-access-token:${SDK_REPO_TOKEN}@github.com/${SDK_REPO}.git"

          if git ls-remote --exit-code --heads origin "$SYNC_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$SYNC_BRANCH:refs/remotes/origin/$SYNC_BRANCH"
          fi

          git push --force-with-lease origin "$SYNC_BRANCH"
        working-directory: sdk
        env:
          SDK_REPO_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}

      - name: Create or update Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          pr_number="$(gh pr list \
            --repo "$SDK_REPO" \
            --head "$SYNC_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --repo "$SDK_REPO" \
              --title "chore: update OpenAPI schema" \
              --body "OpenAPI 스키마가 업데이트되어 자동으로 생성된 PR입니다."
            exit 0
          fi

          gh pr create \
            --repo "$SDK_REPO" \
            --title "chore: update OpenAPI schema" \
            --body "OpenAPI 스키마가 업데이트되어 자동으로 생성된 PR입니다." \
            --base main \
            --head "$SYNC_BRANCH"
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
